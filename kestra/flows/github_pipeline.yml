id: github_daily_pipeline
namespace: tech.trends

description: >
  Daily pipeline - downloads GitHub Archive data,
  uploads to GCS, then loads into BigQuery

tasks:
  - id: ingest_github
    type: io.kestra.plugin.scripts.python.Commands
    docker:
      image: python:3.11
    beforeCommands:
      - git clone https://github.com/Amar-Ag/Tech-Trends- /app
      - pip install -r /app/ingestion/requirements.txt -q
    env:
      GCP_SA_KEY_B64: "{{ kv('GCP_SA_KEY_B64') }}"
      GCS_BUCKET: "tech-trends-bucket-489801"
      INGEST_DATE: "{{ execution.startDate | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
    commands:
      - python /app/ingestion/github_ingest.py

  - id: load_to_bigquery
    type: io.kestra.plugin.scripts.python.Commands
    description: Load parquet files from GCS into BigQuery
    docker:
      image: python:3.11
    beforeCommands:
      - git clone https://github.com/Amar-Ag/Tech-Trends- /app
      - pip install -r /app/ingestion/requirements.txt -q
    env:
      GCP_SA_KEY_B64: "{{ kv('GCP_SA_KEY_B64') }}"
      GCP_PROJECT_ID: "tech-trends-489801"
      GCS_BUCKET: "tech-trends-bucket-489801"
      BQ_DATASET: "raw"
      BQ_TABLE: "github_events"
      INGEST_DATE: "{{ execution.startDate | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
    commands:
      - python /app/ingestion/gcs_to_bigquery.py

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"