name: Backfill GitHub Archive Data

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          ~/.local/bin/uv pip install --system \
            requests pandas pyarrow \
            google-cloud-storage \
            google-cloud-bigquery \
            google-auth python-dotenv

      - name: Run backfill
        env:
          GCS_BUCKET: tech-trends-bucket-489801
          GCP_PROJECT_ID: tech-trends-489801
          BQ_DATASET: raw
          BQ_TABLE: github_events
        run: |
          DATES=(
            "2025-04-01" "2025-04-04"
            "2025-04-07" "2025-04-11"
            "2025-04-14" "2025-04-18"
            "2025-04-21" "2025-04-25"
            "2025-04-28"
            "2025-05-02" "2025-05-05"
            "2025-05-09" "2025-05-12"
            "2025-05-16" "2025-05-19"
            "2025-05-23" "2025-05-26"
            "2025-05-30"
            "2025-06-02" "2025-06-06"
            "2025-06-09" "2025-06-13"
            "2025-06-16" "2025-06-20"
            "2025-06-23" "2025-06-27"
            "2025-06-30"
            "2025-07-04" "2025-07-07"
            "2025-07-11" "2025-07-14"
            "2025-07-18" "2025-07-21"
            "2025-07-25" "2025-07-28"
            "2025-08-01" "2025-08-04"
            "2025-08-08" "2025-08-11"
            "2025-08-15" "2025-08-18"
            "2025-08-22" "2025-08-25"
            "2025-08-29"
            "2025-09-01" "2025-09-05"
            "2025-09-08" "2025-09-12"
            "2025-09-15" "2025-09-19"
            "2025-09-22" "2025-09-26"
            "2025-09-29"
            "2025-10-03" "2025-10-06"
            "2025-10-10" "2025-10-13"
            "2025-10-17" "2025-10-20"
            "2025-10-24" "2025-10-27"
            "2025-10-31"
            "2025-11-03" "2025-11-07"
            "2025-11-10" "2025-11-14"
            "2025-11-17" "2025-11-21"
            "2025-11-24" "2025-11-28"
          )

          for date in "${DATES[@]}"; do
            echo "================================================"
            echo "Ingesting $date..."
            echo "================================================"
            INGEST_DATE=$date python ingestion/github_ingest.py
            INGEST_DATE=$date python ingestion/gcs_to_bigquery.py
            echo "✅ Done: $date"
          done

          echo "Full backfill complete!"